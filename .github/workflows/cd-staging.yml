name: CD - Staging

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/trading-ai

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: staging-deployment
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push services
        run: |
          SERVICES="market_data strategy_engine risk_management execution_engine ai_agent monitoring"
          for SERVICE in $SERVICES; do
            echo "Building $SERVICE..."
            docker buildx build \
              --platform linux/amd64 \
              --file services/$SERVICE/Dockerfile \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$SERVICE:staging \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$SERVICE:${{ github.sha }} \
              --push \
              .
          done

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/trading-ai
            git pull origin main
            export IMAGE_TAG=${{ github.sha }}
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f

      - name: Verify staging deployment
        run: |
          echo "Waiting for services to start..."
          sleep 30
          curl -f ${{ secrets.STAGING_URL }}/health || exit 1
          echo "Staging deployment verified!"

      - name: Notify deployment
        if: always()
        run: echo "Staging deployment status - ${{ job.status }}"
