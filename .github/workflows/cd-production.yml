name: CD - Production

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/trading-ai

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deployment
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract release version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push all services
        run: |
          SERVICES="market_data strategy_engine risk_management execution_engine ai_agent monitoring"
          VERSION=${{ steps.version.outputs.VERSION }}
          for SERVICE in $SERVICES; do
            docker buildx build \
              --platform linux/amd64 \
              --file services/$SERVICE/Dockerfile \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$SERVICE:$VERSION \
              --tag ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-$SERVICE:latest \
              --push \
              .
          done

      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/trading-ai-prod
            git fetch --tags
            git checkout ${{ steps.version.outputs.VERSION }}
            export IMAGE_TAG=${{ steps.version.outputs.VERSION }}

            # Blue-green deployment
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --no-deps --scale market-data=2
            sleep 30
            docker-compose -f docker-compose.prod.yml up -d
            docker system prune -f

      - name: Run smoke tests
        run: |
          sleep 60
          curl -f ${{ secrets.PROD_URL }}/health
          curl -f ${{ secrets.PROD_URL }}/api/market-data/v1/health

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/trading-ai-prod
            docker-compose -f docker-compose.prod.yml up -d --force-recreate
