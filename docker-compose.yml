version: "3.9"

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://trader:trader_pass@postgres:5432/trading_db
  REDIS_URL: redis://redis:6379/0
  MARKET_DATA_SERVICE_URL: http://market-data:8001
  STRATEGY_ENGINE_URL: http://strategy-engine:8002
  RISK_MANAGEMENT_URL: http://risk-management:8003
  EXECUTION_ENGINE_URL: http://execution-engine:8004
  AI_AGENT_URL: http://ai-agent:8005
  MONITORING_URL: http://monitoring:8006
  ENVIRONMENT: development
  LOG_LEVEL: INFO

services:
  # ── Data Layer ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader_pass
      POSTGRES_DB: trading_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Services ─────────────────────────────────────────────────────────
  market-data:
    build:
      context: .
      dockerfile: services/market_data/Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      SECRET_KEY: ${SECRET_KEY:-dev_secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  strategy-engine:
    build:
      context: .
      dockerfile: services/strategy_engine/Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      <<: *common-env
      SECRET_KEY: ${SECRET_KEY:-dev_secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  risk-management:
    build:
      context: .
      dockerfile: services/risk_management/Dockerfile
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      <<: *common-env
      SECRET_KEY: ${SECRET_KEY:-dev_secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  execution-engine:
    build:
      context: .
      dockerfile: services/execution_engine/Dockerfile
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      <<: *common-env
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      SECRET_KEY: ${SECRET_KEY:-dev_secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-agent:
    build:
      context: .
      dockerfile: services/ai_agent/Dockerfile
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      <<: *common-env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      SECRET_KEY: ${SECRET_KEY:-dev_secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  monitoring:
    build:
      context: .
      dockerfile: services/monitoring/Dockerfile
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      <<: *common-env
      SECRET_KEY: ${SECRET_KEY:-dev_secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - nginx

  # ── Reverse Proxy ────────────────────────────────────────────────────────────
  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - market-data
      - strategy-engine
      - risk-management
      - execution-engine
      - ai-agent
      - monitoring

  # ── Observability ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

  grafana:
    image: grafana/grafana:10.2.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_pass}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: trading_network
