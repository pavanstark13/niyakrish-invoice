version: "3.9"

# Production overrides - use with:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

x-prod-env: &prod-env
  ENVIRONMENT: production
  DEBUG: "false"
  LOG_LEVEL: WARNING

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: []  # no external exposure in production

  redis:
    image: redis:7-alpine
    restart: always
    ports: []  # no external exposure in production

  market-data:
    restart: always
    environment:
      <<: *prod-env
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    ports: []

  strategy-engine:
    restart: always
    environment:
      <<: *prod-env
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    ports: []

  risk-management:
    restart: always
    environment:
      <<: *prod-env
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    ports: []

  execution-engine:
    restart: always
    environment:
      <<: *prod-env
    deploy:
      replicas: 1  # single instance to avoid duplicate orders
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    ports: []

  ai-agent:
    restart: always
    environment:
      <<: *prod-env
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    ports: []

  monitoring:
    restart: always
    environment:
      <<: *prod-env
    ports: []

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  frontend:
    restart: always
    ports: []

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
