[build]
builder = "dockerfile"

[[services]]
name = "market-data"
source = "services/market_data"
dockerfile = "services/market_data/Dockerfile"
[services.deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8001}"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

[[services]]
name = "strategy-engine"
source = "services/strategy_engine"
dockerfile = "services/strategy_engine/Dockerfile"
